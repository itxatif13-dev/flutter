name: musicapp
description: "An advanced Flutter music player application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  on_audio_query: ^2.8.2
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  palette_generator: ^0.3.3+7
  animations: ^2.0.11
  flutter_blurhash: ^0.8.2
  font_awesome_flutter: ^10.7.0
  audio_video_progress_bar: ^2.0.3
  marquee: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
